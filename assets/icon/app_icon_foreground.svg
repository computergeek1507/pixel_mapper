      <circle cx="320" cy="320" r="46" fill="#FF3B30"/>
      <circle cx="512" cy="320" r="46" fill="#34C759"/>
      <circle cx="704" cy="320" r="46" fill="#FF9500"/>
      <circle cx="320" cy="512" r="46" fill="#FF9500"/>
      <circle cx="512" cy="512" r="46" fill="#0A84FF"/>
      <circle cx="704" cy="512" r="46" fill="#FF3B30"/>
      <circle cx="320" cy="704" r="46" fill="#34C759"/>
      <circle cx="512" cy="704" r="46" fill="#FF9500"/>
      <circle cx="704" cy="704" r="46" fill="#34C759"/>
    </g>
    <g fill="none" stroke="#FFB74D" stroke-width="34" stroke-linecap="round">
      <path d="M 230 320 L 230 230 L 320 230"/>
      <path d="M 704 230 L 794 230 L 794 320"/>
