<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1565C0"/>
      <stop offset="1" stop-color="#0D2B57"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- pixel grid (the R/G/B base-3 scan pattern) -->
  <g filter="url(#glow)">
    <!-- row 1 -->
    <circle cx="320" cy="320" r="46" fill="#FF3B30"/>
    <circle cx="512" cy="320" r="46" fill="#34C759"/>
    <circle cx="704" cy="320" r="46" fill="#FF9500"/>
    <!-- row 2 -->
    <circle cx="320" cy="512" r="46" fill="#FF9500"/>
    <circle cx="512" cy="512" r="46" fill="#0A84FF"/>
    <circle cx="704" cy="512" r="46" fill="#FF3B30"/>
    <!-- row 3 -->
    <circle cx="320" cy="704" r="46" fill="#34C759"/>
    <circle cx="512" cy="704" r="46" fill="#FF9500"/>
    <circle cx="704" cy="704" r="46" fill="#34C759"/>
  </g>

  <!-- camera viewfinder corner brackets -->
  <g fill="none" stroke="#FFB74D" stroke-width="34" stroke-linecap="round">
    <!-- top-left -->
    <path d="M 230 320 L 230 230 L 320 230"/>
    <!-- top-right -->
    <path d="M 704 230 L 794 230 L 794 320"/>
    <!-- bottom-left -->
    <path d="M 230 704 L 230 794 L 320 794"/>
    <!-- bottom-right -->
    <path d="M 794 704 L 794 794 L 704 794"/>
  </g>
</svg>
